<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UTD Bookstore</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>UTD Bookstore</h1>
  </header>

  <main class="content">
    <section class="hero">
      <h2>Official UTD Gear</h2>
      <p>Shop hoodies, tumblers, and Temoc stickers.</p>
    </section>

    <section class="products-section">
      <h2>Products</h2>
      <div id="product-grid" class="product-grid">
        <!-- JS will inject product cards here -->
      </div>
    </section>
  </main>

  <!-- Checkout popup -->
  <div id="checkout-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Checkout</h3>
      <p id="checkout-product-name"></p>
      <label>
        Name:
        <input type="text" id="checkout-name" />
      </label>
      <label>
        UTD ID:
        <input type="text" id="checkout-utd-id" />
      </label>
      <div class="modal-actions">
        <button id="checkout-confirm">Confirm</button>
        <button id="checkout-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/frontend.js"></script>
</body>
</html>
